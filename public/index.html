<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kira Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d1a;
            color: white;
            font-family: 'Nunito', Arial, sans-serif;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
        }

        /* BG ANIMATED */
        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow-1 { background: #f0c040; top: -100px; left: -100px; animation: glow1 8s infinite alternate; }
        .bg-glow-2 { background: #e07b00; bottom: -100px; right: -100px; animation: glow2 10s infinite alternate; }
        @keyframes glow1 { 0% { transform: translate(0,0); } 100% { transform: translate(50px,50px); } }
        @keyframes glow2 { 0% { transform: translate(0,0); } 100% { transform: translate(-50px,-50px); } }

        /* NAV */
        .nav {
            display: flex;
            justify-content: space-around;
            background: rgba(22,33,62,0.95);
            backdrop-filter: blur(20px);
            padding: 12px 0 16px;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 100;
            border-top: 1px solid rgba(240,192,64,0.1);
        }
        .nav-btn {
            background: none;
            border: none;
            color: #555;
            font-size: 10px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0 15px;
        }
        .nav-btn.active { color: #f0c040; }
        .nav-btn .nav-icon {
            font-size: 24px;
            transition: transform 0.3s;
        }
        .nav-btn.active .nav-icon { transform: scale(1.2); }

        /* PAGES */
        .page { display: none; padding: 20px; padding-bottom: 90px; position: relative; z-index: 1; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HOME */
        .home {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 8px 20px;
            margin-bottom: 20px;
        }
        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f0c040, #e07b00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .player-name { font-size: 15px; font-weight: 800; }

        .coins-container {
            text-align: center;
            margin-bottom: 5px;
        }
        .coins-label { font-size: 13px; color: #888; margin-bottom: 5px; }
        .coins {
            font-size: 58px;
            font-weight: 900;
            background: linear-gradient(135deg, #f0c040, #ff9500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transition: transform 0.1s;
            line-height: 1;
        }

        .stats-row {
            display: flex;
            gap: 15px;
            margin: 15px 0 25px;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(240,192,64,0.2);
            border-radius: 15px;
            padding: 8px 15px;
            text-align: center;
            font-size: 12px;
            color: #aaa;
        }
        .stat-box strong { display: block; color: #f0c040; font-size: 14px; font-weight: 800; }

        /* TAP BUTTON */
        .tap-container {
            position: relative;
            margin-bottom: 20px;
        }
        .tap-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 2px solid rgba(240,192,64,0.3);
            animation: ringPulse 2s infinite;
        }
        .tap-ring-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 290px;
            height: 290px;
            border-radius: 50%;
            border: 1px solid rgba(240,192,64,0.15);
            animation: ringPulse 2s infinite 0.5s;
        }
        @keyframes ringPulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0; }
        }
        .tap-btn {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ffe066, #f0c040 40%, #e07b00 80%, #b35900);
            border: none;
            font-size: 95px;
            cursor: pointer;
            box-shadow: 0 0 60px rgba(240,192,64,0.4), 0 20px 40px rgba(0,0,0,0.5), inset 0 -5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
            position: relative;
            z-index: 1;
        }
        .tap-btn:active {
            transform: scale(0.92);
            box-shadow: 0 0 30px rgba(240,192,64,0.2), 0 10px 20px rgba(0,0,0,0.5);
        }
        .tap-info { font-size: 13px; color: #666; margin-top: 5px; }

        /* FLOAT TAP */
        .float-tap {
            position: fixed;
            font-size: 22px;
            font-weight: 900;
            color: #f0c040;
            text-shadow: 0 2px 10px rgba(240,192,64,0.5);
            pointer-events: none;
            animation: floatUp 0.8s ease forwards;
            z-index: 999;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.3); }
        }

        /* CARDS */
        h2 {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .card {
            background: linear-gradient(135deg, rgba(22,33,62,0.9), rgba(15,25,50,0.9));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f0c040, transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card:active { transform: scale(0.95); border-color: rgba(240,192,64,0.4); }
        .card:active::before { opacity: 1; }
        .card-icon { font-size: 38px; margin-bottom: 5px; }
        .card-name { font-size: 13px; font-weight: 800; margin-bottom: 3px; }
        .card-level {
            font-size: 11px;
            color: #888;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 2px 8px;
            display: inline-block;
            margin-bottom: 5px;
        }
        .card-income { font-size: 12px; color: #4caf50; font-weight: 700; margin: 3px 0; }
        .card-cost {
            font-size: 13px;
            color: #f0c040;
            font-weight: 800;
            margin-top: 8px;
            background: rgba(240,192,64,0.1);
            border-radius: 10px;
            padding: 4px 8px;
        }

        /* LEADERBOARD */
        .leader-item {
            display: flex;
            align-items: center;
            background: rgba(22,33,62,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 14px 15px;
            margin-bottom: 10px;
            gap: 12px;
            transition: transform 0.2s;
        }
        .leader-item:first-child { border-color: rgba(240,192,64,0.3); background: rgba(240,192,64,0.05); }
        .leader-rank { font-size: 22px; width: 35px; text-align: center; }
        .leader-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f0c040, #e07b00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .leader-name { flex: 1; font-size: 14px; font-weight: 700; }
        .leader-coins { font-size: 14px; color: #f0c040; font-weight: 800; }

        /* REFERRAL */
        .ref-box {
            background: linear-gradient(135deg, rgba(240,192,64,0.1), rgba(224,123,0,0.05));
            border: 1px solid rgba(240,192,64,0.2);
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            margin-bottom: 15px;
        }
        .ref-box h3 { font-size: 20px; font-weight: 900; margin-bottom: 8px; }
        .ref-box p { color: #aaa; font-size: 14px; margin-bottom: 15px; line-height: 1.5; }
        .ref-link {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(240,192,64,0.2);
            border-radius: 12px;
            padding: 12px;
            font-size: 11px;
            color: #f0c040;
            word-break: break-all;
            margin-bottom: 15px;
            text-align: left;
        }
        .copy-btn {
            background: linear-gradient(135deg, #f0c040, #e07b00);
            color: #1a1a2e;
            border: none;
            border-radius: 15px;
            padding: 14px 30px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-family: 'Nunito', sans-serif;
            transition: transform 0.2s;
        }
        .copy-btn:active { transform: scale(0.97); }
        .ref-stats {
            background: rgba(22,33,62,0.8);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
        }
        .ref-stats h3 { font-size: 16px; color: #aaa; margin-bottom: 10px; font-weight: 700; }
        .ref-count { font-size: 52px; font-weight: 900; color: #f0c040; }
    
.mission-item {
    background: linear-gradient(135deg, rgba(22,33,62,0.9), rgba(15,25,50,0.9));
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 15px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 15px;
}
.mission-item.completed { opacity: 0.5; }
.mission-icon { font-size: 36px; }
.mission-info { flex: 1; }
.mission-name { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
.mission-reward { font-size: 13px; color: #f0c040; font-weight: 700; }
.mission-progress { font-size: 12px; color: #888; margin-top: 3px; }
.mission-btn {
    background: linear-gradient(135deg, #f0c040, #e07b00);
    color: #1a1a2e;
    border: none;
    border-radius: 12px;
    padding: 10px 15px;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    white-space: nowrap;
}
.mission-btn.done {
    background: rgba(255,255,255,0.1);
    color: #888;
    cursor: default;
}
</style>
</head>
<body>

<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<!-- HOME -->
<div class="page active" id="page-home">
    <div class="home">
        <div class="player-info">
            <div class="player-avatar">👤</div>
            <div class="player-name" id="username">Joueur</div>
        </div>

        <div class="coins-container">
            <div class="coins-label">💰 Tes coins</div>
            <div class="coins" id="coins">0</div>
        </div>

        <div class="stats-row">
            <div class="stat-box">
                <strong id="per-hour-val">0</strong>
                coins/heure
            </div>
            <div class="stat-box">
                <strong id="tap-value">1</strong>
                par tap
            </div>
        </div>

        <div class="tap-container">
            <div class="tap-ring"></div>
            <div class="tap-ring-2"></div>
            <button class="tap-btn" id="tap-btn">👊</button>
        </div>

        <div class="tap-info">Tape pour gagner des coins !</div>
    </div>
</div>

<!-- CARDS -->
<div class="page" id="page-cards">
    <h2>🃏 Cartes</h2>
    <div class="cards-grid" id="cards-grid"></div>
</div>

<!-- LEADERBOARD -->
<div class="page" id="page-leaderboard">
    <h2>🏆 Classement</h2>
    <div id="leaderboard-list"></div>
</div>

<!-- REFERRAL -->
<div class="page" id="page-referral">
    <h2>👥 Parrainage</h2>
    <div class="ref-box">
        <h3>🎁 Invite tes amis !</h3>
        <p>Gagne <strong style="color:#f0c040">500 coins</strong> pour chaque ami qui rejoint Kira Game !</p>
        <div class="ref-link" id="ref-link">Chargement...</div>
        <button class="copy-btn" id="copy-btn">📋 Copier mon lien</button>
    </div>
    <div class="ref-stats">
        <h3>Amis invités</h3>
        <div class="ref-count" id="ref-count">0</div>
    </div>
</div>

<!-- MISSIONS -->
<div class="page" id="page-missions">
    <h2>🎯 Missions</h2>
    <div id="missions-list"></div>
</div>

<!-- NAV -->
<nav class="nav">
    <button class="nav-btn active" onclick="showPage('home', this)">
        <span class="nav-icon">🎮</span>Jouer
    </button>
    <button class="nav-btn" onclick="showPage('cards', this)">
        <span class="nav-icon">🃏</span>Cartes
    </button>
    <button class="nav-btn" onclick="showPage('missions', this)">
        <span class="nav-icon">🎯</span>Missions
    </button>
    <button class="nav-btn" onclick="showPage('leaderboard', this)">
        <span class="nav-icon">🏆</span>Top
    </button>
    <button class="nav-btn" onclick="showPage('referral', this)">
        <span class="nav-icon">👥</span>Amis
    </button>
</nav>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const API = 'https://kira-game-production.up.railway.app';
const telegramId = tg.initDataUnsafe?.user?.id?.toString() || 'test123';
const telegramUsername = tg.initDataUnsafe?.user?.first_name || tg.initDataUnsafe?.user?.username || 'Joueur';

let coins = 0;
let coinsPerTap = 1;
let coinsPerHour = 0;
let cards = [];
let referrals = 0;
let saveTimeout = null;

const CARDS = [
    { id: 'mine', icon: '⛏️', name: 'Mine', baseCost: 100, baseIncome: 10 },
    { id: 'factory', icon: '🏭', name: 'Usine', baseCost: 500, baseIncome: 50 },
    { id: 'bank', icon: '🏦', name: 'Banque', baseCost: 2000, baseIncome: 200 },
    { id: 'rocket', icon: '🚀', name: 'Fusée', baseCost: 10000, baseIncome: 1000 },
    { id: 'robot', icon: '🤖', name: 'Robot', baseCost: 50000, baseIncome: 5000 },
    { id: 'satellite', icon: '🛸', name: 'Satellite', baseCost: 200000, baseIncome: 20000 },
];

function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'leaderboard') loadLeaderboard();
}

function formatNumber(n) {
    n = Math.floor(n || 0);
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return n.toString();
}

function updateUI() {
    document.getElementById('username').textContent = telegramUsername;
    document.getElementById('coins').textContent = formatNumber(coins);
    document.getElementById('per-hour-val').textContent = formatNumber(coinsPerHour);
    document.getElementById('tap-value').textContent = coinsPerTap;
    document.getElementById('ref-count').textContent = referrals;
    document.getElementById('ref-link').textContent = 'https://t.me/KiraGameBot?start=' + telegramId;
    renderCards();
}

async function loadUser() {
    try {
        const res = await fetch(API + '/api/user/init', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ telegramId, username: telegramUsername })
        });
        if (res.ok) {
            const user = await res.json();
            coins = parseInt(user.coins) || 0;
            coinsPerTap = parseInt(user.coins_per_tap) || 1;
            coinsPerHour = parseInt(user.coins_per_hour) || 0;
            cards = user.cards || [];
            referrals = parseInt(user.referrals) || 0;
        }
    } catch(e) { console.log('Erreur:', e); }
    updateUI();
}

async function saveCoins() {
    try {
        await fetch(API + '/api/user/' + telegramId + '/tap', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ coins: Math.floor(coins) })
        });
    } catch(e) {}
}

document.getElementById('tap-btn').addEventListener('click', (e) => {
    coins += coinsPerTap;
    const el = document.getElementById('coins');
    el.textContent = formatNumber(coins);
    el.style.transform = 'scale(1.15)';
    setTimeout(() => el.style.transform = 'scale(1)', 100);

    const float = document.createElement('div');
    float.className = 'float-tap';
    float.textContent = '+' + coinsPerTap;
    float.style.left = (e.clientX - 15) + 'px';
    float.style.top = (e.clientY - 30) + 'px';
    document.body.appendChild(float);
    setTimeout(() => float.remove(), 800);

    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveCoins, 1500);
});

function renderCards() {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = '';
    CARDS.forEach(card => {
        const userCard = cards.find(c => c.cardId === card.id);
        const level = userCard ? parseInt(userCard.level) : 0;
        const cost = Math.floor(card.baseCost * Math.pow(1.5, level));
        const income = card.baseIncome * (level + 1);
        const canAfford = coins >= cost;

        const div = document.createElement('div');
        div.className = 'card';
        div.style.opacity = canAfford ? '1' : '0.6';
        div.innerHTML = `
            <div class="card-icon">${card.icon}</div>
            <div class="card-name">${card.name}</div>
            <div class="card-level">Niv. ${level}</div>
            <div class="card-income">+${formatNumber(income)}/h</div>
            <div class="card-cost">💰 ${formatNumber(cost)}</div>
        `;
        div.onclick = () => buyCard(card.id, cost, card.baseIncome);
        grid.appendChild(div);
    });
}

async function buyCard(cardId, cost, baseIncome) {
    if (coins < cost) { alert('Pas assez de coins !'); return; }
    try {
        const res = await fetch(API + '/api/user/' + telegramId + '/buy-card', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ cardId, cost, coinsPerHour: baseIncome })
        });
        if (res.ok) {
            const user = await res.json();
            coins = parseInt(user.coins) || 0;
            coinsPerTap = parseInt(user.coins_per_tap) || 1;
            coinsPerHour = parseInt(user.coins_per_hour) || 0;
            cards = user.cards || [];
            updateUI();
        }
    } catch(e) { alert('Erreur achat !'); }
}

async function loadLeaderboard() {
    try {
        const res = await fetch(API + '/api/leaderboard');
        const users = await res.json();
        const medals = ['🥇', '🥈', '🥉'];
        document.getElementById('leaderboard-list').innerHTML = users.map((u, i) => `
            <div class="leader-item">
                <div class="leader-rank">${medals[i] || (i+1)}</div>
                <div class="leader-avatar">👤</div>
                <div class="leader-name">${u.username}</div>
                <div class="leader-coins">💰 ${formatNumber(u.coins)}</div>
            </div>
        `).join('');
    } catch(e) {}
}

document.getElementById('copy-btn').addEventListener('click', () => {
    navigator.clipboard.writeText('https://t.me/KiraGameBot?start=' + telegramId)
        .then(() => alert('Lien copié ! 🎉'));
});

setInterval(() => {
    if (coinsPerHour > 0) {
        coins += coinsPerHour / 3600;
        document.getElementById('coins').textContent = formatNumber(coins);
    }
}, 1000);


const MISSIONS = [
    { id: 'daily_login', icon: '📅', name: 'Connexion du jour', desc: 'Connecte-toi aujourd hui', reward: 500, check: () => true },
    { id: 'tap_100', icon: '👆', name: 'Tapeur', desc: 'Tape 100 fois', reward: 1000, check: () => tapCount >= 100 },
    { id: 'buy_card', icon: '🃏', name: 'Collectionneur', desc: 'Achète une carte', reward: 2000, check: () => cards.length > 0 },
    { id: 'coins_1000', icon: '💰', name: 'Riche !', desc: 'Accumule 1000 coins', reward: 3000, check: () => coins >= 1000 },
];

let completedMissions = [];
let tapCount = 0;

async function loadMissions() {
    try {
        const res = await fetch(API + '/api/missions/' + telegramId);
        if (res.ok) {
            const data = await res.json();
            completedMissions = data.map(m => m.mission_id);
        }
    } catch(e) {}
    renderMissions();
}

function renderMissions() {
    const list = document.getElementById('missions-list');
    if (!list) return;
    list.innerHTML = MISSIONS.map(m => {
        const done = completedMissions.includes(m.id);
        const canClaim = m.check() && !done;
        return `<div class="mission-item ${done ? 'completed' : ''}">
            <div class="mission-icon">${m.icon}</div>
            <div class="mission-info">
                <div class="mission-name">${m.name}</div>
                <div class="mission-reward">+${formatNumber(m.reward)} coins</div>
                <div class="mission-progress">${m.desc}</div>
            </div>
            <button class="mission-btn ${done ? 'done' : ''}" onclick="claimMission('${m.id}', ${m.reward})" ${done ? 'disabled' : ''}>
                ${done ? '✅' : canClaim ? 'Réclamer' : '⏳'}
            </button>
        </div>`;
    }).join('');
}

async function claimMission(missionId, reward) {
    const mission = MISSIONS.find(m => m.id === missionId);
    if (!mission || !mission.check()) { alert('Mission pas encore accomplie !'); return; }
    try {
        const res = await fetch(API + '/api/missions/' + telegramId + '/complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ missionId, reward })
        });
        if (res.ok) {
            const user = await res.json();
            coins = parseInt(user.coins) || 0;
            completedMissions.push(missionId);
            updateUI();
            renderMissions();
            alert('🎉 +' + formatNumber(reward) + ' coins !');
        } else {
            const err = await res.json();
            alert(err.error || 'Erreur');
        }
    } catch(e) { alert('Erreur réseau'); }
}

const originalShowPage = showPage;
showPage = function(name, btn) {
    originalShowPage(name, btn);
    if (name === 'missions') loadMissions();
};

const tapBtn2 = document.getElementById('tap-btn');
tapBtn2.addEventListener('click', () => {
    tapCount++;
    renderMissions();
});

loadUser();
loadMissions();
